{% extends "base.html" %}

{% block content %}

<h1 class="text-3xl font-bold text-gray-800 mb-8">Add New Recipe</h1>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <form method="POST" action="/add">

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Recipe Title *</label>
            <input type="text" name="title" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
                placeholder="e.g. Chocolate Chip Cookies">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" name="description"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
                placeholder="Short description of the recipe">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ingredients * <span class="text-gray-400 font-normal">(comma separated)</span></label>
            <textarea name="ingredients" required rows="3"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
                placeholder="eggs, flour, milk, sugar, butter"></textarea>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Instructions *</label>
            <textarea name="instructions" required rows="5"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
                placeholder="Step 1: Mix the dry ingredients..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cook Time</label>
                <input type="text" name="cook_time"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
                    placeholder="e.g. 30 mins">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select name="category"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                    <option value="Dessert">Dessert</option>
                </select>
            </div>
        </div>

        <button type="submit"
            class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">
            Save Recipe
        </button>

    </form>
</div>

{% endblock %}
