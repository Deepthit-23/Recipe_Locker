{% extends "base.html" %}

{% block content %}

<h1 class="text-3xl font-bold text-gray-800 mb-8">Edit Recipe</h1>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <form method="POST" action="/edit/{{ recipe.id }}">

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Recipe Title *</label>
            <input type="text" name="title" required value="{{ recipe.title }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <input type="text" name="description" value="{{ recipe.description }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Ingredients * <span class="text-gray-400 font-normal">(comma separated)</span></label>
            <textarea name="ingredients" required rows="3"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">{{ recipe.ingredients }}</textarea>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">Instructions *</label>
            <textarea name="instructions" required rows="5"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">{{ recipe.instructions }}</textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cook Time</label>
                <input type="text" name="cook_time" value="{{ recipe.cook_time }}"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select name="category"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400">
                    {% for cat in ['Breakfast', 'Lunch', 'Dinner', 'Snack', 'Dessert'] %}
                    <option value="{{ cat }}" {% if recipe.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex gap-4">
            <button type="submit"
                class="flex-1 bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">
                Update Recipe
            </button>
            <a href="/recipe/{{ recipe.id }}"
                class="flex-1 text-center border border-gray-300 text-gray-600 py-3 rounded-lg hover:bg-gray-50 transition">
                Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
