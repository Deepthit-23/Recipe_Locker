<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Locker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-orange-500">🍳 Recipe Locker</a>
            <div class="flex gap-4">
                <a href="/" class="text-gray-600 hover:text-orange-500">Home</a>
                <a href="/add" class="bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600">+ Add Recipe</a>
                <a href="/search" class="text-gray-600 hover:text-orange-500">🔍 Search</a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
